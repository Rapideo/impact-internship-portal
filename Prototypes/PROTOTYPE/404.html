<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found — IMPACT</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- NAV -->
  <header class="nav">
    <div class="nav__inner">
      <a href="index.html" class="wordmark" aria-label="IMPACT — Expand Your Opportunities">
        <img src="logo.png" alt="IMPACT — Expand Your Opportunities" class="wordmark__img" />
      </a>
      <nav class="nav__links">
        <a href="index.html" class="nav__link">Home</a>
        <a href="login.html" class="nav__cta">Admin Sign In</a>
      </nav>
    </div>
  </header>

  <!-- 404 -->
  <main class="confirm">
    <div class="container confirm__inner">

      <div class="confirm__badge" aria-hidden="true" style="background: var(--canvas-alt); color: var(--muted); box-shadow: none;">
        <svg viewBox="0 0 48 48" width="48" height="48" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
          <circle cx="12" cy="12" r="0" />
        </svg>
      </div>

      <span class="micro-label">ERROR / 404 / PAGE NOT FOUND</span>

      <h1 class="confirm__title" style="color: var(--muted);">
        <span style="color: var(--gold);">404.</span><br/>Page not found.
      </h1>

      <p class="confirm__body">
        This page doesn't exist, or the resource you're looking for has been moved.
        If you followed a link from inside the portal, please let your program admin know.
      </p>

      <div class="confirm__actions" style="gap: 14px;">
        <a href="index.html" class="btn btn--primary">Return Home <span class="btn__arrow">&rarr;</span></a>
        <a href="admin.html" class="btn btn--outline">Admin Home</a>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container footer__row">
      <a href="index.html" class="wordmark" aria-label="IMPACT — Expand Your Opportunities">
        <img src="logo.png" alt="IMPACT — Expand Your Opportunities" class="wordmark__img" />
      </a>
      <div class="footer__links">
        <a href="index.html">Home</a>
        <a href="login.html">Admin</a>
        <a href="#">Contact</a>
      </div>
      <div class="footer__meta">&copy; 2026 IMPACT / Indiana</div>
    </div>
  </footer>

</body>
</html>
