name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanity:
    name: Sanity checks (stub)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Confirm required scaffolding files exist
        run: |
          test -f .github/PULL_REQUEST_TEMPLATE.md
          test -f .github/CODEOWNERS
          test -f .github/dependabot.yml
          test -f .github/workflows/ci.yml
          echo "All scaffolding files present."

      - name: Confirm scaffolding has no TODO/FIXME/XXX markers
        run: |
          if grep -RIn --include="*.md" -E "\b(TODO|FIXME|XXX)\b" .github/; then
            echo "Found TODO/FIXME/XXX markers in .github/ — fail to surface unfinished scaffolding."
            exit 1
          fi
          echo "No TODO/FIXME/XXX markers in .github/."

      - name: Stub for real CI stages
        run: |
          echo "CI stub passing. Real stages (lint, typecheck, vitest, playwright, build)"
          echo "are wired in during sub-project 1's Foundation phases."

  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Generate React Router route types
        run: npx react-router typegen
      - run: npm run lint
      - run: npm run typecheck

  test-unit:
    name: Vitest (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm test
        env:
          SUPABASE_URL: 'https://example.supabase.co'
          SUPABASE_ANON_KEY: 'fake'
          SUPABASE_SERVICE_ROLE_KEY: 'fake'
          DATABASE_URL: 'postgresql://fake'
          DATABASE_POOL_URL: 'postgresql://fake'
          RESEND_API_KEY: 'fake'
          RESEND_FROM: 'fake@example.com'
          APP_URL: 'http://localhost:5173'

  test-integration:
    name: Vitest (integration + RLS) on supabase start
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          # Pinned (was `latest`): the local Postgres stack in supabase CLI
          # v2.106/v2.107 stopped auto-granting table privileges to anon/
          # authenticated/service_role on freshly-migrated tables, which broke
          # the RLS suite. db/policies/0000_grants.sql is the durable fix; this
          # pin keeps the toolchain deterministic too. Bump deliberately.
          version: 2.107.0
      - run: npm ci
      - name: Start local Supabase stack
        run: supabase start
      - name: Export local Supabase credentials to env
        # `supabase status -o env` emits shell-style `KEY="value"` lines. $GITHUB_ENV
        # treats the surrounding quotes as part of the value, so we strip them. We
        # also alias supabase's names (DB_URL, API_URL, ANON_KEY, SERVICE_ROLE_KEY)
        # to the names env.server.ts expects (DATABASE_URL, DATABASE_POOL_URL,
        # SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY).
        run: |
          supabase status -o env | sed 's/="\(.*\)"$/=\1/' >> "$GITHUB_ENV"
          eval "$(supabase status -o env)"
          {
            echo "DATABASE_URL=${DB_URL}"
            echo "DATABASE_POOL_URL=${DB_URL}"
            echo "SUPABASE_URL=${API_URL}"
            echo "SUPABASE_ANON_KEY=${ANON_KEY}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}"
            echo "RESEND_API_KEY=fake"
            echo "RESEND_FROM=fake@example.com"
            echo "APP_URL=http://localhost:5173"
          } >> "$GITHUB_ENV"
      - name: Apply migrations + policies + seed
        run: |
          npm run db:migrate
          npm run db:apply-policies
          npm run db:seed
      - name: Run unit tests against live local stack
        run: npm test
      - name: Run RLS tests
        run: npm run test:rls
      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup

  e2e:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          # Pinned (was `latest`): the local Postgres stack in supabase CLI
          # v2.106/v2.107 stopped auto-granting table privileges to anon/
          # authenticated/service_role on freshly-migrated tables, which broke
          # the RLS suite. db/policies/0000_grants.sql is the durable fix; this
          # pin keeps the toolchain deterministic too. Bump deliberately.
          version: 2.107.0
      - run: npm ci
      - name: Generate React Router route types
        run: npx react-router typegen
      - name: Start local Supabase stack
        run: supabase start
      - name: Export local Supabase credentials to env
        # Mirrors test-integration's env-var bridge; aliases supabase status names
        # (DB_URL, API_URL, ANON_KEY, SERVICE_ROLE_KEY) to what env.server.ts
        # expects.
        run: |
          eval "$(supabase status -o env)"
          {
            echo "DATABASE_URL=${DB_URL}"
            echo "DATABASE_POOL_URL=${DB_URL}"
            echo "SUPABASE_URL=${API_URL}"
            echo "SUPABASE_ANON_KEY=${ANON_KEY}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}"
            echo "SESSION_SECRET=ci-only-not-secret-fffb413e27d12b2f96b2dd9d9cdf0f2888aacce86af2867eb55a0c0873d6803a"
            echo "RESEND_API_KEY=fake"
            echo "RESEND_FROM=fake@example.com"
            echo "APP_URL=http://localhost:5173"
          } >> "$GITHUB_ENV"
      - name: Apply migrations + policies
        run: |
          npm run db:migrate
          npm run db:apply-policies
      - name: Create test auth users (admin + employer1)
        # admin:create writes the auth.users entry; db:seed below restores
        # the profile row with the correct role+employer_id based on email
        # (see db/seed.ts:262 — the script branches on the email literal).
        # Without these two calls, Playwright sign-in fails because the
        # admin@example.com / employer1@example.com accounts don't exist in
        # the local Supabase stack.
        run: |
          npm run admin:create -- --email=admin@example.com --password=DevPassword123!
          npm run admin:create -- --email=employer1@example.com --password=DevPassword123!
      - name: Seed dev data
        run: npm run db:seed
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright suite
        run: npm run test:e2e
        env:
          CI: 'true'
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup
